name: Bug Report
description: Report a bug or exception in the stock-portfolio application
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as possible to help us reproduce and fix the issue.

  - type: input
    id: username
    attributes:
      label: Username
      description: The username or account affected by this issue.
      placeholder: e.g. john.doe
    validations:
      required: false

  - type: input
    id: session_id
    attributes:
      label: Session / Correlation ID
      description: The session ID or correlation ID from the application logs or response headers. This helps us trace the exact request.
      placeholder: e.g. sess_abc123 or corr-7f3a2b1c-4d5e-6f78
    validations:
      required: false

  - type: textarea
    id: exception
    attributes:
      label: Exception / Error Details
      description: Paste the full exception message, stack trace, or error output here.
      placeholder: |
        Exception type: NullPointerException
        Message: ...
        Stack trace:
          at com.example.portfolio.StockService.getPortfolio(StockService.java:42)
          ...
      render: text
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Observe the error '...'
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe the expected behavior...
    validations:
      required: false

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe the actual behavior...
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this issue?
      options:
        - Critical – Application crash / data loss
        - High – Major feature broken
        - Medium – Feature partially broken
        - Low – Minor / cosmetic issue
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      description: The environment where the issue occurred.
      placeholder: e.g. Production, Staging, Local
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or log snippets that may help diagnose the issue.
    validations:
      required: false
